name: CI

on:
  push:
    branches: [ '**' ]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  ARDUINO_BOARD_MANAGER_ADDITIONAL_URLS: https://espressif.github.io/arduino-esp32/package_esp32_index.json
  ARDUINO_CLI_VERSION: 1.5.0
  ARDUINO_NETWORK_CONNECTION_TIMEOUT: 240s
  ESP32_CORE_VERSION: 3.3.9
  PIOARDUINO_PLATFORM_URL: https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
  PIOARDUINO_PLATFORM_VERSION: 55.03.39
  PIOARDUINO_VERSION: 6.1.19

jobs:
  source-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Audit production sources
        run: |
          if grep -RInE '(^|[^[:alnum:]_])throw([^[:alnum:]_]|$)|std::abort[[:space:]]*\(' src; then
            echo "Embedded safety audit failed: throw/std::abort is not allowed"
            exit 1
          fi
          if grep -RInF 'millis()' src; then
            echo "Embedded safety audit failed: use pulseNowMs() instead of millis()"
            exit 1
          fi
          if grep -RInF 'std::vector' src; then
            echo "Embedded safety audit failed: std::vector is not allowed in production sources"
            exit 1
          fi
          if grep -RInF 'std::string' src; then
            echo "Embedded safety audit failed: std::string is not allowed in production sources"
            exit 1
          fi
          if grep -RInF 'sizeof(PulseCommand *)' src; then
            echo "Embedded safety audit failed: PulseCommand queue must store values"
            exit 1
          fi
          if grep -RInF 'new (std::nothrow) PulseCommand' src; then
            echo "Embedded safety audit failed: PulseCommand must not be heap allocated"
            exit 1
          fi
          if grep -RInF 'delete command' src; then
            echo "Embedded safety audit failed: PulseCommand must not require delete"
            exit 1
          fi
          result_message_accessor='.message'
          if grep -RInF "${result_message_accessor}.c_str()" .; then
            echo "Embedded safety audit failed: result messages are const char pointers"
            exit 1
          fi

  release-version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate package and tag versions
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            python3 scripts/check_release_version.py --tag "${GITHUB_REF_NAME}"
          else
            python3 scripts/check_release_version.py
          fi

  host-tests:
    runs-on: ubuntu-latest
    needs: source-audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build host runtime tests
        run: |
          mkdir -p build/host-tests
          common_sources=(src/Pulse.cpp tests/host/freertos_fake.cpp)
          common_flags=(
            -std=c++20
            -pthread
            -Wall
            -Wextra
            -Wpedantic
            -Itests/host/include
            -Isrc
          )
          g++ "${common_flags[@]}" \
            "${common_sources[@]}" \
            tests/host/pulse_host_tests.cpp \
            -o build/host-tests/pulse-host-tests
          g++ "${common_flags[@]}" \
            "${common_sources[@]}" \
            tests/host/pulse_extended_tests.cpp \
            -o build/host-tests/pulse-extended-tests

      - name: Stack high-water bytes
        run: ./build/host-tests/pulse-host-tests stack-high-water-bytes

      - name: Clear another already-due timer
        run: ./build/host-tests/pulse-host-tests clear-already-due-timer

      - name: Callback-side end returns Busy
        run: ./build/host-tests/pulse-host-tests callback-end-busy

      - name: Self-pause preserves interval
        run: ./build/host-tests/pulse-host-tests self-pause-interval

      - name: Long callback shutdown timeout and retry
        run: ./build/host-tests/pulse-host-tests long-callback-shutdown

      - name: Repeated lifecycle cycles
        run: ./build/host-tests/pulse-host-tests repeated-lifecycle

      - name: Scheduler ordering and countdown semantics
        run: ./build/host-tests/pulse-extended-tests scheduler-semantics

      - name: Restart and pause semantics
        run: ./build/host-tests/pulse-extended-tests restart-and-pause

      - name: Queue-full rollback and shutdown priority
        run: ./build/host-tests/pulse-extended-tests queue-and-shutdown

      - name: Concurrent initialization, stale waiters, and destruction
        run: ./build/host-tests/pulse-extended-tests lifecycle-concurrency

      - name: Callback destruction and diagnostics
        run: ./build/host-tests/pulse-extended-tests cleanup-and-diagnostics

      - name: Callback command batch ordering
        run: ./build/host-tests/pulse-extended-tests callback-command-batch

  no-exceptions-build:
    runs-on: ubuntu-latest
    needs: source-audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile production sources without exceptions
        run: |
          mkdir -p build/no-exceptions
          g++ \
            -std=c++20 \
            -fno-exceptions \
            -pthread \
            -Wall \
            -Wextra \
            -Wpedantic \
            -Itests/host/include \
            -Isrc \
            -c src/Pulse.cpp \
            -o build/no-exceptions/Pulse.o

  build-examples:
    runs-on: ubuntu-latest
    needs: [source-audit, host-tests, no-exceptions-build, release-version-check]
    strategy:
      fail-fast: false
      matrix:
        board: [esp32dev, esp32-s3-devkitc-1, esp32-c3-devkitm-1, esp32-p4-evboard]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache PIOArduino
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pioarduino-${{ env.PIOARDUINO_VERSION }}-${{ env.PIOARDUINO_PLATFORM_VERSION }}-${{ hashFiles('**/library.json') }}
          restore-keys: |
            ${{ runner.os }}-pioarduino-${{ env.PIOARDUINO_VERSION }}-${{ env.PIOARDUINO_PLATFORM_VERSION }}-

      - name: Install PIOArduino Core
        run: python -m pip install --upgrade "pioarduino==${PIOARDUINO_VERSION}"

      - name: Install PIOArduino ESP32 Platform
        run: pio pkg install -g -p "${PIOARDUINO_PLATFORM_URL}"

      - name: Build library examples
        run: |
          set -e
          for d in examples/*; do
            if [ -d "$d" ]; then
              echo "Building $d on ${{ matrix.board }}"
              pio ci "$d" \
                --board ${{ matrix.board }} \
                --lib="." \
                --project-option "platform=${PIOARDUINO_PLATFORM_URL}" \
                --project-option "build_unflags=-std=gnu++11" \
                --project-option "build_flags=-std=gnu++20"
            fi
          done

      - name: Compile on-device smoke suite
        run: |
          pio ci tests/device/PulseSmoke \
            --board ${{ matrix.board }} \
            --lib="." \
            --project-option "platform=${PIOARDUINO_PLATFORM_URL}" \
            --project-option "build_unflags=-std=gnu++11" \
            --project-option "build_flags=-std=gnu++20 -DPULSE_SMOKE_USE_PSRAM=0"

  arduino-cli:
    runs-on: ubuntu-latest
    needs: [source-audit, host-tests, no-exceptions-build, release-version-check]
    strategy:
      fail-fast: false
      matrix:
        board:
          - fqbn: esp32:esp32:esp32
            name: esp32dev
          - fqbn: esp32:esp32:esp32s3
            name: esp32-s3-devkitc-1
          - fqbn: esp32:esp32:esp32c3
            name: esp32-c3-devkitm-1
          - fqbn: esp32:esp32:esp32p4
            name: esp32-p4-evboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2
        with:
          version: ${{ env.ARDUINO_CLI_VERSION }}

      - name: Cache Arduino CLI packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/.cache/arduino
          key: ${{ runner.os }}-arduino-cli-${{ env.ARDUINO_CLI_VERSION }}-esp32-${{ env.ESP32_CORE_VERSION }}
          restore-keys: |
            ${{ runner.os }}-arduino-cli-${{ env.ARDUINO_CLI_VERSION }}-esp32-

      - name: Install ESP32 core
        run: |
          arduino-cli core update-index
          arduino-cli core install "esp32:esp32@${ESP32_CORE_VERSION}"

      - name: Add local library to sketchbook
        run: |
          set -e
          SKETCHBOOK_DIR="${HOME}/Arduino"
          mkdir -p "$SKETCHBOOK_DIR/libraries/Pulse"
          rsync -a --delete --exclude ".git" ./ "$SKETCHBOOK_DIR/libraries/Pulse/"

      - name: Build examples (${{ matrix.board.name }})
        env:
          FQBN: ${{ matrix.board.fqbn }}
        run: |
          set -e
          for d in examples/*; do
            if [ -d "$d" ]; then
              echo "Compiling $d"
              arduino-cli compile \
                --fqbn "$FQBN" \
                --build-property "compiler.cpp.extra_flags=-std=gnu++20" \
                "$d"
            fi
          done

      - name: Compile on-device smoke suite (${{ matrix.board.name }})
        env:
          FQBN: ${{ matrix.board.fqbn }}
        run: |
          arduino-cli compile \
            --fqbn "$FQBN" \
            --build-property "compiler.cpp.extra_flags=-std=gnu++20 -DPULSE_SMOKE_USE_PSRAM=0" \
            tests/device/PulseSmoke

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - source-audit
      - release-version-check
      - host-tests
      - no-exceptions-build
      - build-examples
      - arduino-cli
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate release changelog
        run: |
          python3 scripts/generate_release_changelog.py \
            --target-ref "${GITHUB_REF_NAME}" \
            --tag-name "${GITHUB_REF_NAME}" \
            --output "release-changelog.md"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false
          body_path: release-changelog.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
